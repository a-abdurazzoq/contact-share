services:
  mysql:
    image: mysql:8.0
    container_name: contact-share-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: contact_share
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contact-share-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/contact_share
      JWT_ACCESS_SECRET: super-secret-access-key-change-in-production-min-32-chars
      JWT_REFRESH_SECRET: super-secret-refresh-key-change-in-production-min-32-chars
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
      APP_BASE_URL: http://localhost:3000
      CORS_ORIGINS: '*'
    ports:
      - '3000:3000'
    volumes:
      - ./uploads:/app/uploads

volumes:
  mysql_data:
