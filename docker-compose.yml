version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: contact-share-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contact_share
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d contact_share" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contact-share-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/contact_share?schema=public
      JWT_ACCESS_SECRET: super-secret-access-key-change-in-production-min-32-chars
      JWT_REFRESH_SECRET: super-secret-refresh-key-change-in-production-min-32-chars
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
      APP_BASE_URL: http://localhost:3000
      CORS_ORIGINS: '*'
    ports:
      - '3000:3000'
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
